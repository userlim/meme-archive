<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#A21CAF"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Film/play icon -->
    <rect x="26" y="30" width="48" height="40" rx="6" stroke-width="2.5" fill="rgba(255,255,255,0.1)"/>
    <!-- Play triangle -->
    <path d="M44 42 L44 58 L60 50 Z" fill="rgba(255,255,255,0.9)" stroke="none"/>
    <!-- Film sprockets top -->
    <circle cx="34" cy="30" r="3" fill="white" stroke="none" opacity="0.5"/>
    <circle cx="50" cy="30" r="3" fill="white" stroke="none" opacity="0.5"/>
    <circle cx="66" cy="30" r="3" fill="white" stroke="none" opacity="0.5"/>
    <!-- LOL text -->
    <text x="50" y="24" text-anchor="middle" font-size="11" font-weight="900" fill="rgba(255,255,255,0.8)" stroke="none" font-family="sans-serif">LOL</text>
  </g>
</svg>